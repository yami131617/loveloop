name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:
    inputs:
      server_url:
        description: "URL the APK WebView will load"
        default: "https://loveloop.app"
        required: true

permissions:
  contents: write   # to attach APK to a release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: npm install
        run: npm ci

      - name: Sync Capacitor
        env:
          CAP_SERVER_URL: ${{ github.event.inputs.server_url || 'https://loveloop.app' }}
        run: npx cap sync android

      - name: Build debug APK
        working-directory: web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename artifact
        run: |
          mkdir -p build
          cp android/app/build/outputs/apk/debug/app-debug.apk build/LoveLoop-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoveLoop-APK
          path: web/build/LoveLoop-*.apk
          retention-days: 30

      - name: Attach APK to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: web/build/LoveLoop-*.apk
